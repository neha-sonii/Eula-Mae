kind = "web"
previewPath = "/"
title = "Eula Mae's"
version = "1.0.0"
id = "artifacts/eula-maes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20473

[services.development]
run = "pnpm --filter @workspace/eula-maes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eula-maes", "run", "build" ]
publicDir = "artifacts/eula-maes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20473"
BASE_PATH = "/"
